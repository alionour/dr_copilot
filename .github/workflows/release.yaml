name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate changelog
        id: changelog
        run: |
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"- %s (%h)" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Draft Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            # Dr Copilot ${{ github.ref_name }}
            
            ## Changes
            ${{ steps.changelog.outputs.CHANGELOG }}
            
            ## Downloads
            - **Windows**: Download `dr_copilot-windows-x64-${{ github.ref_name }}.zip` and extract
            - **Linux**: Download `dr_copilot-linux-x64-${{ github.ref_name }}.AppImage` and make executable
            - **Android**: Download the appropriate APK for your device architecture
            - **Web**: Deployed to Firebase Hosting
            
            ## Installation Instructions
            
            ### Windows
            1. Download and extract the ZIP file
            2. Run `dr_copilot.exe`
            
            ### Linux
            1. Download the AppImage file
            2. Make it executable: `chmod +x dr_copilot-linux-x64-${{ github.ref_name }}.AppImage`
            3. Run: `./dr_copilot-linux-x64-${{ github.ref_name }}.AppImage`
            
            ### Android
            1. Download the appropriate APK (arm64-v8a for most modern devices)
            2. Enable installation from unknown sources
            3. Install the APK
          draft: true
          prerelease: false

  build-windows:
    needs: create-release
    uses: ./.github/workflows/deploy-windows.yaml

  build-linux:
    needs: create-release
    uses: ./.github/workflows/deploy-linux.yaml

  build-android:
    needs: create-release
    uses: ./.github/workflows/deploy-android.yaml

  build-web:
    needs: create-release
    uses: ./.github/workflows/deploy-web.yaml

  publish-release:
    needs: [build-windows, build-linux, build-android, build-web]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Publish Release
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = context.ref.replace('refs/tags/', '');
            
            // Get the release
            const releases = await github.rest.repos.listReleases({ owner, repo });
            const release = releases.data.find(r => r.tag_name === tag);
            
            if (release && release.draft) {
              // Publish the release
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.id,
                draft: false
              });
              console.log('Release published successfully!');
            }
