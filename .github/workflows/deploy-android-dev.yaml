name: Deploy Android to Google Play Internal Testing

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy-to-internal-testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for commit count

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Get build number from commit count
        id: build_number
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Build number: $BUILD_NUMBER"

      - name: Update version in pubspec.yaml
        run: |
          BUILD_NUMBER=${{ steps.build_number.outputs.build_number }}
          # Get current version (e.g., 1.0.0)
          CURRENT_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          # Update with new build number
          sed -i "s/^version:.*/version: $CURRENT_VERSION+$BUILD_NUMBER/" pubspec.yaml
          cat pubspec.yaml | grep version

      - name: Install dependencies
        run: doppler run -- flutter pub get
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Decode keystore from Doppler
        run: |
          doppler secrets get ANDROID_KEYSTORE_BASE64 --plain | base64 --decode > android/app/keystore.jks
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Create key.properties from Doppler
        run: |
          cat > android/key.properties << EOF
          storePassword=$(doppler secrets get ANDROID_KEYSTORE_PASSWORD --plain)
          keyPassword=$(doppler secrets get ANDROID_KEY_PASSWORD --plain)
          keyAlias=$(doppler secrets get ANDROID_KEY_ALIAS --plain)
          storeFile=keystore.jks
          EOF
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Build App Bundle
        run: doppler run -- flutter build appbundle --release
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Get service account JSON from Doppler (with GitHub fallback)
        id: service_account
        run: |
          # Try Doppler first
          if SA_JSON=$(doppler secrets get GOOGLE_PLAY_SERVICE_ACCOUNT_JSON --plain 2>/dev/null); then
            echo "✅ Using service account from Doppler"
            echo "json<<EOF" >> $GITHUB_OUTPUT
            echo "$SA_JSON" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          elif [ -n "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}" ]; then
            # Fallback to GitHub Secrets
            echo "⚠️ Doppler failed, using service account from GitHub Secrets"
            echo "json<<EOF" >> $GITHUB_OUTPUT
            echo "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "❌ Service account JSON not found in Doppler or GitHub Secrets"
            exit 1
          fi
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Upload to Google Play Internal Testing
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ steps.service_account.outputs.json }}
          packageName: com.alionour.drcopilot
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          inAppUpdatePriority: 2
          whatsNewDirectory: android/release-notes/
          mappingFile: build/app/outputs/mapping/release/mapping.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-internal-testing-${{ steps.build_number.outputs.build_number }}
          path: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/mapping/release/mapping.txt
          retention-days: 30

      - name: Comment on commit
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const buildNumber = '${{ steps.build_number.outputs.build_number }}';
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `✅ Successfully deployed build #${buildNumber} to Google Play Internal Testing!\n\n[View in Play Console](https://play.google.com/console/)`
            })
