name: Deploy Windows (Store & ZIP)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Get build number from commit count
        id: build_number
        run: |
          $build_number = git rev-list --count HEAD
          echo "build_number=$build_number" >> $env:GITHUB_OUTPUT
          Write-Host "Build number: $build_number"

      - name: Update version in pubspec.yaml
        run: |
          $build_number = "${{ steps.build_number.outputs.build_number }}"
          # Read pubspec
          $content = Get-Content pubspec.yaml -Raw
          # Extract version
          if ($content -match 'version:\s*([^\+]+)') {
            $base_version = $matches[1].Trim()
            # MSIX requires strictly 4 parts: Major.Minor.Build.Revision
            # We use Major.Minor.Patch.BuildNumber
            $new_version_line = "version: $base_version.$build_number"
            # Replace
            $content = $content -replace 'version:.*', $new_version_line
            Set-Content pubspec.yaml $content
            Write-Host "Updated pubspec version to $base_version.$build_number"
          }

      - name: Create MSIX Config
        # We can dynamically inject secrets into pubspec.yaml or use command line args for msix:create
        # For now, we assume pubspec.yaml has the base config and we override/augment if needed.
        # But msix package recommends having config in pubspec.yaml.
        # If secrets are needed for signing, we handle them here.
        run: echo "Configuring MSIX..."

      - name: Build MSIX
        # If we need to sign with a certificate file, we would decode it from secrets here.
        # For Store, we can use the store submission API which handles signing or we self-sign for testing.
        # flutter pub run msix:create --store
        run: flutter pub run msix:create

      - name: Publish to Microsoft Store
        run: flutter pub run msix:publish
        env:
          MSIX_TENANT_ID: ${{ secrets.MSSTORE_TENANT_ID }}
          MSIX_CLIENT_ID: ${{ secrets.MSSTORE_CLIENT_ID }}
          MSIX_CLIENT_SECRET: ${{ secrets.MSSTORE_CLIENT_SECRET }}

      - name: Create Windows ZIP Archive
        run: |
          cd build/windows/runner/Release
          powershell Compress-Archive -Path * -DestinationPath ../../../../dr_copilot-windows-${{ github.ref_name }}.zip
          cd ../../../..

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dr_copilot-windows-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
