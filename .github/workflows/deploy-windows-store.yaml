name: Deploy Windows (Store & ZIP)

on:
  push:
    tags:
      - 'v*'            # Triggers all workflows
      - 'windows-v*'    # Triggers only Windows
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-msix:
    name: Build MSIX
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Pub packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Pub\Cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Nuget packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.config', '**/*.vcxproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install dependencies
        run: flutter pub get

      - name: Get build number from commit count
        id: build_number
        run: |
          $build_number = git rev-list --count HEAD
          echo "build_number=$build_number" >> $env:GITHUB_OUTPUT
          Write-Host "Build number: $build_number"

      - name: Update version in pubspec.yaml
        run: |
          $build_number = "${{ steps.build_number.outputs.build_number }}"
          # Read pubspec
          $content = Get-Content pubspec.yaml -Raw
          # Extract version
          if ($content -match 'version:\s*([^\+]+)') {
            $base_version = $matches[1].Trim()
            $new_version_line = "version: $base_version.$build_number"
            $content = $content -replace 'version:.*', $new_version_line
            Set-Content pubspec.yaml $content
            Write-Host "Updated pubspec version to $base_version.$build_number"
          }

      - name: Create MSIX Config
        run: echo "Configuring MSIX..."

      - name: Build MSIX
        run: flutter pub run msix:create --store

      - name: Upload MSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: msix-package
          path: build/windows/runner/Release/*.msix
          retention-days: 1

      - name: Create Windows ZIP Archive
        run: |
          cd build/windows/runner/Release
          powershell Compress-Archive -Path * -DestinationPath ../../../../dr_copilot-windows-${{ github.ref_name }}.zip
          cd ../../../..

      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dr_copilot-windows-${{ github.ref_name }}.zip
          draft: false
          prerelease: false

  publish-store:
    name: Publish to Store
    needs: build-msix
    runs-on: windows-latest
    steps:
      - name: Download MSIX Artifact
        uses: actions/download-artifact@v4
        with:
          name: msix-package
          path: dist

      - name: Setup MSStore CLI
        uses: microsoft/setup-msstore-cli@v1

      - name: Authenticate with Microsoft Store
        # Pipe 'y' to bypass "Are you sure?" prompt
        run: echo "y" | msstore reconfigure --tenantId ${{ secrets.MSSTORE_TENANT_ID }} --clientId ${{ secrets.MSSTORE_CLIENT_ID }} --clientSecret ${{ secrets.MSSTORE_CLIENT_SECRET }}

      - name: Publish to Microsoft Store
        run: |
          $msixPath = Get-ChildItem -Path dist/ -Filter *.msix | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "Publishing $msixPath..."
          msstore publish --path "$msixPath" --appId ${{ secrets.MSSTORE_APP_ID }} --verbose
