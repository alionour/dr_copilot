name: Build Windows MSIX

on:
  push:
    branches: [ "dev" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build MSIX
        run: dart run msix:create --store

      - name: Publish to Microsoft Store
        uses: microsoft/setup-msstore-cli@v1
      - run: msstore publish --path "build/windows/runner/Release/DrCopilot.msix" --tenantId "${{ secrets.WINDOWS_STORE_TENANT_ID }}" --clientId "${{ secrets.WINDOWS_STORE_CLIENT_ID }}" --clientSecret "${{ secrets.WINDOWS_STORE_CLIENT_SECRET }}"

      - name: Upload MSIX Artifact (Backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dr-copilot-windows
          path: build/windows/runner/Release/*.msix
          retention-days: 5
