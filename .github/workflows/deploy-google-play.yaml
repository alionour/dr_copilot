name: Deploy to Google Play

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: false

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Get build number from commit count
        id: build_number
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Build number: $BUILD_NUMBER"

      - name: Update version in pubspec.yaml
        run: |
          BUILD_NUMBER=${{ steps.build_number.outputs.build_number }}
          # Get current version (e.g., 1.0.0) from pubspec
          CURRENT_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          # Update with new build number
          sed -i "s/^version:.*/version: $CURRENT_VERSION+$BUILD_NUMBER/" pubspec.yaml
          cat pubspec.yaml | grep version

      - name: Install dependencies
        run: doppler run -- flutter pub get
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Decode keystore from Doppler
        run: |
          doppler secrets get ANDROID_KEYSTORE_BASE64 --plain | base64 --decode > android/app/keystore.jks
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Create key.properties from Doppler
        run: |
          cat > android/key.properties << EOF
          storePassword=$(doppler secrets get ANDROID_KEYSTORE_PASSWORD --plain)
          keyPassword=$(doppler secrets get ANDROID_KEY_PASSWORD --plain)
          keyAlias=$(doppler secrets get ANDROID_KEY_ALIAS --plain)
          storeFile=keystore.jks
          EOF
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Build APKs (split per ABI)
        run: doppler run -- flutter build apk --release --split-per-abi
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Build App Bundle
        run: doppler run -- flutter build appbundle --release
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Rename APK files
        run: |
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/dr_copilot-armeabi-v7a-${{ github.ref_name }}.apk || true
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/dr_copilot-arm64-v8a-${{ github.ref_name }}.apk || true
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk build/app/outputs/flutter-apk/dr_copilot-x86_64-${{ github.ref_name }}.apk || true

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/app-release.aab

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/app/outputs/flutter-apk/dr_copilot-*.apk
            build/app/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false

      - name: Publish to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.alionour.drcopilot
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
          # userFraction: 0.50 # Optional: Rollout percentage when checking status is 'inProgress'
