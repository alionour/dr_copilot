name: Deploy to Google Play

on:
  push:
    tags:
      - 'v*'            # Triggers all workflows
      - 'android-v*'    # Triggers only Android
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: false

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Get build number from commit count
        id: build_number
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Build number: $BUILD_NUMBER"

      - name: Update version in pubspec.yaml
        run: |
          BUILD_NUMBER=${{ steps.build_number.outputs.build_number }}
          # Get current version (e.g., 1.0.0) from pubspec
          CURRENT_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          # Update with new build number
          sed -i "s/^version:.*/version: $CURRENT_VERSION+$BUILD_NUMBER/" pubspec.yaml
          cat pubspec.yaml | grep version

      - name: Install dependencies
        run: doppler run -- flutter pub get
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Decode keystore from Doppler
        run: |
          doppler secrets get ANDROID_KEYSTORE_BASE64 --plain | base64 --decode > android/app/keystore.jks
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Create key.properties from Doppler
        run: |
          cat > android/key.properties << EOF
          storePassword=$(doppler secrets get ANDROID_KEYSTORE_PASSWORD --plain)
          keyPassword=$(doppler secrets get ANDROID_KEY_PASSWORD --plain)
          keyAlias=$(doppler secrets get ANDROID_KEY_ALIAS --plain)
          storeFile=keystore.jks
          EOF
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Build APKs (split per ABI)
        run: doppler run -- flutter build apk --release --split-per-abi
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Build App Bundle
        run: doppler run -- flutter build appbundle --release
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Rename APK files
        run: |
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/dr_copilot-armeabi-v7a-${{ github.ref_name }}.apk || true
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/dr_copilot-arm64-v8a-${{ github.ref_name }}.apk || true
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk build/app/outputs/flutter-apk/dr_copilot-x86_64-${{ github.ref_name }}.apk || true

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/app-release.aab

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/app/outputs/flutter-apk/dr_copilot-*.apk
            build/app/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false

      - name: Publish to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.alionour.drcopilot
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Legacy screenshot step removed as integration_test/screenshot_generator_test.dart does not exist.
      # Screenshot testing is currently validated on Windows runner.

      - name: Add Screenshots to Job Summary
        if: always()
        run: |
          echo "## Generated Store Screenshots" >> $GITHUB_STEP_SUMMARY
          echo "Screenshots captured during integration test:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check if screenshots exist
          if [ -d "build/screenshots" ]; then
             echo "| Screenshot | Name |" >> $GITHUB_STEP_SUMMARY
             echo "| :---: | --- |" >> $GITHUB_STEP_SUMMARY
             
             # Note: We cannot embed images directly from local path in Summary, 
             # but we can list them. GitHub Actions Summary supports viewing uploaded artifacts 
             # via the artifacts UI, not directly embedding them unless hosted externally.
             # However, we can list filenames to confirm generation.
             
             for f in build/screenshots/*.png; do
               filename=$(basename "$f")
               echo "| 📷 | $filename |" >> $GITHUB_STEP_SUMMARY
             done
          else
             echo "No screenshots found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Setup Fastlane
        if: success()
        run: |
          cd android
          # Create service_account.json from secret
          echo "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}" > fastlane/service_account.json
          gem install fastlane
      
      - name: Upload Metadata & Screenshots to Google Play
        if: success()
        run: |
          cd android
          fastlane capture_screenshots
