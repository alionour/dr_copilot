name: Deploy to Firebase Hosting

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'master'
          cache: true

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install dependencies
        run: doppler run -- flutter pub get
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Build web
        run: |
          doppler run --command "flutter build web --release --dart-define=GOOGLE_OAUTH_CLIENT_ID=\$GOOGLE_OAUTH_CLIENT_ID --dart-define=GOOGLE_OAUTH_CLIENT_SECRET=\$GOOGLE_OAUTH_CLIENT_SECRET --dart-define=GOOGLE_REFRESH_TOKEN=\$GOOGLE_REFRESH_TOKEN"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: |
          FIREBASE_TOKEN=$(doppler secrets get FIREBASE_TOKEN --plain)
          firebase deploy --only hosting --project drcopilot-bfc9e --token "$FIREBASE_TOKEN" --non-interactive
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Create web archive
        run: |
          cd build
          tar -czf ../dr_copilot-web-${{ github.ref_name }}.tar.gz web/

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: dr_copilot-web-${{ github.ref_name }}.tar.gz

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dr_copilot-web-${{ github.ref_name }}.tar.gz
          draft: false
          prerelease: false
