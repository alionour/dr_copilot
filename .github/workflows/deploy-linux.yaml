name: Deploy Linux

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Install AppImage dependencies
        run: |
          sudo add-apt-repository universe
          sudo apt update
          sudo apt install -y libfuse2

      - name: Download appimagetool
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Create AppDir structure
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/lib
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
          
      - name: Create desktop file
        run: |
          cat > AppDir/dr_copilot.desktop << EOF
          [Desktop Entry]
          Name=Dr Copilot
          Exec=dr_copilot
          Icon=dr_copilot
          Type=Application
          Categories=Utility;
          EOF

      - name: Add icon
        run: |
          cp assets/svg/drcopilot_logo.svg AppDir/dr_copilot.svg || echo "Icon not found, skipping"

      - name: Create AppRun
        run: |
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin/:${HERE}/usr/sbin/:${HERE}/usr/games/:${HERE}/bin/:${HERE}/sbin/${PATH:+:$PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib/:${HERE}/usr/lib/i386-linux-gnu/:${HERE}/usr/lib/x86_64-linux-gnu/:${HERE}/usr/lib32/:${HERE}/usr/lib64/${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/dr_copilot" "$@"
          EOF
          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: |
          ./appimagetool-x86_64.AppImage AppDir dr_copilot-linux-x64-${{ github.ref_name }}.AppImage

      - name: Create tar.gz archive
        run: |
          tar -czf dr_copilot-linux-x64-${{ github.ref_name }}.tar.gz -C build/linux/x64/release bundle

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            dr_copilot-linux-x64-${{ github.ref_name }}.AppImage
            dr_copilot-linux-x64-${{ github.ref_name }}.tar.gz

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dr_copilot-linux-x64-${{ github.ref_name }}.AppImage
            dr_copilot-linux-x64-${{ github.ref_name }}.tar.gz
          draft: false
          prerelease: false
