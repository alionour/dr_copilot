<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Check-In Kiosk</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 60px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            display: none;
            /* Hide initially to prevent flash */
        }

        h1 {
            font-size: 56px;
            color: #333;
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 28px;
            color: #666;
            margin-bottom: 40px;
        }

        input {
            font-size: 36px;
            padding: 24px;
            width: 100%;
            border: 3px solid #ddd;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            font-size: 32px;
            padding: 24px 80px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .message {
            margin-top: 30px;
            font-size: 24px;
            min-height: 60px;
        }

        .success {
            color: #28a745;
            font-weight: bold;
        }

        .error {
            color: #dc3545;
        }

        .loading {
            color: #667eea;
        }

        .checkmark {
            font-size: 80px;
            animation: scaleIn 0.5s ease-out;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
            }

            to {
                transform: scale(1);
            }
        }

        .expired-container {
            text-align: center;
        }

        .expired-icon {
            font-size: 100px;
            color: #dc3545;
            margin-bottom: 20px;
        }

        /* Tabs */
        .tab {
            background: #f0f0f0;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            color: #666;
            transition: all 0.2s;
        }

        .tab.active {
            background: #667eea;
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 30px;
                max-width: 90%;
            }

            h1 {
                font-size: 36px;
            }

            .subtitle {
                font-size: 20px;
                margin-bottom: 30px;
            }

            input {
                font-size: 24px;
                padding: 16px;
                margin-bottom: 20px;
            }

            button {
                font-size: 24px;
                padding: 16px 40px;
                width: 100%;
            }

            .checkmark {
                font-size: 60px;
            }

            .expired-icon {
                font-size: 80px;
            }
        }
    </style>
</head>

<body>
    <div class="container" id="mainContainer">
        <h1>🏥 Welcome!</h1>
        <p class="subtitle">Enter your details to check in</p>

        <!-- Tabs -->
        <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 30px;">
            <button class="tab active" onclick="switchTab('phone')" id="tab-phone">Phone Number</button>
            <button class="tab" onclick="switchTab('id')" id="tab-id">Appointment ID</button>
        </div>

        <!-- Phone Input -->
        <div id="section-phone">
            <input type="tel" id="phone" placeholder="Enter Phone Number" autocomplete="off" />
        </div>

        <!-- ID Input -->
        <div id="section-id" style="display: none;">
            <input type="text" id="appointmentId" placeholder="Enter Appointment ID" autocomplete="off" />
        </div>

        <button id="checkInBtn" onclick="checkIn()">Check In</button>

        <div id="message" class="message"></div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC6APKuTlDJP9gGT9usJGj1Ub1Eev592PU",
            authDomain: "drcopilot-bfc9e.firebaseapp.com",
            projectId: "drcopilot-bfc9e",
            storageBucket: "drcopilot-bfc9e.firebasestorage.app",
            messagingSenderId: "253522261255",
            appId: "1:253522261255:web:b0c3541bbd0e1da51001a2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let clinicId = null;
        let tokenValidated = false;
        let currentMethod = 'phone';

        function switchTab(method) {
            currentMethod = method;

            // Toggle Tabs
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${method}`).classList.add('active');

            // Toggle Inputs
            document.getElementById('section-phone').style.display = method === 'phone' ? 'block' : 'none';
            document.getElementById('section-id').style.display = method === 'id' ? 'block' : 'none';

            // Clear inputs and messages
            document.getElementById('phone').value = '';
            document.getElementById('appointmentId').value = '';
            document.getElementById('message').innerHTML = '';
        }

        // Validate token on page load
        window.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const clinicIdParam = urlParams.get('clinicId');

            if (!token) {
                document.getElementById('mainContainer').style.display = 'block';
                showExpiredPage('No token provided');
                return;
            }

            try {
                let tokenDoc = null;

                // 1. Try Direct Lookup (Fast & Robust) if clinicId is present
                if (clinicIdParam) {
                    console.log('Attempting direct lookup for clinic:', clinicIdParam);
                    const docRef = db.collection('clinics').doc(clinicIdParam).collection('kiosk_tokens').doc(token);
                    const docSnapshot = await docRef.get();

                    if (docSnapshot.exists && docSnapshot.data().active === true) {
                        tokenDoc = docSnapshot;
                    }
                }
                // 2. Fallback to Collection Group Query
                else {
                    console.log('Fallback to collectionGroup query');
                    const snapshot = await db.collectionGroup('kiosk_tokens')
                        .where('token', '==', token)
                        .where('active', '==', true)
                        .limit(1)
                        .get();

                    if (!snapshot.empty) {
                        tokenDoc = snapshot.docs[0];
                    }
                }

                if (!tokenDoc) {
                    document.getElementById('mainContainer').style.display = 'block';
                    showExpiredPage('Invalid or expired kiosk link');
                    return;
                }

                const tokenData = tokenDoc.data();
                clinicId = tokenData.clinicId;
                tokenValidated = true;

                // Update last used timestamp
                try {
                    await tokenDoc.ref.update({
                        lastUsedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (e) {
                    console.warn('Could not update lastUsedAt (likely permission issue), but token is valid.', e);
                }

                console.log('Kiosk authenticated for clinic:', clinicId);
                document.getElementById('mainContainer').style.display = 'block';

            } catch (error) {
                console.error('Token validation error:', error);
                document.getElementById('mainContainer').style.display = 'block';
                showExpiredPage('Error validating kiosk link');
            }
        });

        function showExpiredPage(reason) {
            const container = document.getElementById('mainContainer');
            container.innerHTML = `
                <div class="expired-container">
                    <div class="expired-icon">🚫</div>
                    <h1 style="color: #dc3545; margin-bottom: 20px;">Link Expired</h1>
                    <p class="subtitle">This kiosk link has been revoked or is invalid.</p>
                    <p style="font-size: 20px; color: #666; margin-top: 20px;">
                        Please contact clinic staff to generate a new kiosk link.
                    </p>
                    <p style="font-size: 14px; color: #999; margin-top: 40px;">
                        Debug: ${reason}
                    </p>
                </div>
            `;
        }

        async function checkIn() {
            if (!tokenValidated) {
                showMessage('Kiosk not authenticated', 'error');
                return;
            }

            const messageEl = document.getElementById('message');
            const button = document.getElementById('checkInBtn');
            const phone = document.getElementById('phone').value.trim();
            const appointmentId = document.getElementById('appointmentId').value.trim();

            let queryPromise;

            if (currentMethod === 'phone') {
                if (!phone) {
                    showMessage('Please enter your phone number', 'error');
                    return;
                }

                // Prepare Phone Query
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const tomorrow = new Date(today);
                tomorrow.setDate(tomorrow.getDate() + 1);

                queryPromise = db.collection('calendar_events')
                    .where('clinicId', '==', clinicId)
                    .where('patientPhone', '==', phone)
                    .where('startTime', '>=', firebase.firestore.Timestamp.fromDate(today))
                    .where('startTime', '<', firebase.firestore.Timestamp.fromDate(tomorrow))
                    .get();

            } else { // ID Method
                if (!appointmentId) {
                    showMessage('Please enter your Appointment ID', 'error');
                    return;
                }

                // Prepare ID Query
                queryPromise = db.collection('calendar_events').doc(appointmentId).get()
                    .then(doc => {
                        // Validate clinic ownership and basic existence
                        if (doc.exists && doc.data().clinicId === clinicId) {
                            return { empty: false, docs: [doc] };
                        }
                        return { empty: true };
                    });
            }

            // Execute Query
            button.disabled = true;
            showMessage('Searching for your appointment...', 'loading');

            try {
                const snapshot = await queryPromise;

                if (snapshot.empty) {
                    showMessage('❌ No appointment found', 'error');
                    button.disabled = false;
                    return;
                }

                // Update first matching appointment
                const appointmentDoc = snapshot.docs[0];
                await appointmentDoc.ref.update({
                    status: 'arrived',
                    arrivedAt: firebase.firestore.Timestamp.now()
                });

                // Show success
                messageEl.innerHTML = `
                    <div class="checkmark">✅</div>
                    <p class="success">Check-in successful!</p>
                    <p style="font-size: 20px; color: #666; margin-top: 10px;">
                        Please have a seat in the waiting area.
                    </p>
                `;

                // Clear input
                document.getElementById('phone').value = '';
                document.getElementById('appointmentId').value = '';

                // Reset after 5 seconds
                setTimeout(() => {
                    messageEl.innerHTML = '';
                    button.disabled = false;
                }, 5000);

            } catch (error) {
                console.error('Check-in error:', error);
                showMessage(`Error: ${error.message}`, 'error');
                button.disabled = false;
            }
        }

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.innerHTML = `<p class="${type}">${text}</p>`;
        }

        // Allow Enter key to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const activeInput = currentMethod === 'phone' ? document.getElementById('phone') : document.getElementById('appointmentId');
                // Only submit if the user is focused on the relevant input
                if (document.activeElement === activeInput) {
                    checkIn();
                }
            }
        });
    </script>
</body>

</html>
