<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Body Chart</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            pointer-events: none;
            display: none;
            z-index: 1000;
            max-width: 250px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        #tooltip .marker-type {
            font-weight: bold;
            margin-bottom: 4px;
            color: #4CAF50;
        }

        #tooltip .marker-notes {
            margin-bottom: 4px;
            font-size: 12px;
        }

        #tooltip .marker-time {
            font-size: 11px;
            color: #BBB;
        }
    </style>
</head>

<body>
    <div id="container"></div>
    <div id="tooltip"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1, 2);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('container').appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7.5);
        scene.add(directionalLight);

        // Controls
        const orbitControls = new THREE.OrbitControls(camera, renderer.domElement);
        orbitControls.enableDamping = true;
        orbitControls.dampingFactor = 0.05;

        const transformControl = new THREE.TransformControls(camera, renderer.domElement);
        transformControl.addEventListener('dragging-changed', (event) => {
            orbitControls.enabled = !event.value;
        });

        transformControl.addEventListener('change', () => {
            if (transformControl.object) {
                const obj = transformControl.object;
                const id = obj.userData.id;
                if (id && window.flutter_inappwebview) {
                    window.flutter_inappwebview.callHandler('onMarkerTransformed', {
                        id: id,
                        x: obj.position.x,
                        y: obj.position.y,
                        z: obj.position.z,
                        scale: obj.scale.x
                    });
                }
            }
        });

        scene.add(transformControl);
        transformControl.setMode('translate');

        // Store for markers and model
        let bodyModel = null;
        const markers = {};

        // Raycaster for click and hover detection
        // Raycaster for click and hover detection
        const raycaster = new THREE.Raycaster();
        const tooltip = document.getElementById('tooltip');
        let hoveredMarker = null;
        let selectedMarkerId = null; // Track selected marker for animation
        let interactionMode = 'select'; // 'select' or 'add'
        const mouse = new THREE.Vector2();

        // Get model from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const modelName = urlParams.get('model') || 'human_body.glb';

        // Adaptive marker sizing based on model
        const markerSizes = {
            'human_body.glb': 0.05,
            'human_head.glb': 0.03,
            'human_skeleton.glb': 0.04,
            'human_brain.glb': 0.02,
            'human_teeth_folder/scene.gltf': 0.01
        };
        const defaultMarkerRadius = markerSizes[modelName] || 0.05;

        // Load 3D Model
        const loader = new THREE.GLTFLoader();
        loader.load(
            `/models/${modelName}`,
            (gltf) => {
                bodyModel = gltf.scene;

                // Center and scale model
                const box = new THREE.Box3().setFromObject(bodyModel);
                const center = box.getCenter(new THREE.Vector3());
                bodyModel.position.sub(center);

                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 1.5 / maxDim;
                bodyModel.scale.setScalar(scale);

                scene.add(bodyModel);

                // Frame the model in view
                const scaledBox = new THREE.Box3().setFromObject(bodyModel);
                const scaledSize = scaledBox.getSize(new THREE.Vector3());
                const scaledCenter = scaledBox.getCenter(new THREE.Vector3());

                // Calculate optimal camera distance
                const maxSize = Math.max(scaledSize.x, scaledSize.y, scaledSize.z);
                const fitHeightDistance = maxSize / (2 * Math.atan(Math.PI * camera.fov / 360));
                const fitWidthDistance = fitHeightDistance / camera.aspect;
                const distance = 1.2 * Math.max(fitHeightDistance, fitWidthDistance);

                // Position camera to look at model
                camera.position.set(
                    scaledCenter.x + distance * 0.5,
                    scaledCenter.y + distance * 0.5,
                    scaledCenter.z + distance
                );
                camera.lookAt(scaledCenter);

                // Update orbit controls target
                orbitControls.target.copy(scaledCenter);
                orbitControls.update();
            },
            undefined,
            (error) => {
                console.error('Error loading model:', error);
            }
        );

        // Mousemove handler for tooltips
        renderer.domElement.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const markerObjects = Object.values(markers);
            const markerIntersects = raycaster.intersectObjects(markerObjects, false);

            if (markerIntersects.length > 0) {
                const marker = markerIntersects[0].object;
                const markerId = marker.userData.id;

                if (hoveredMarker !== markerId) {
                    hoveredMarker = markerId;

                    // Request marker details from Flutter
                    if (window.flutter_inappwebview) {
                        window.flutter_inappwebview.callHandler('onMarkerHover', { id: markerId });
                    }
                }

                // Position tooltip near cursor
                tooltip.style.left = (event.clientX + 15) + 'px';
                tooltip.style.top = (event.clientY + 15) + 'px';
                tooltip.style.display = 'block';

                // Change cursor
                renderer.domElement.style.cursor = 'pointer';
            } else {
                hoveredMarker = null;
                tooltip.style.display = 'none';
                renderer.domElement.style.cursor = 'default';
            }
        });

        // Expose function to update tooltip content from Flutter
        window.updateTooltip = function (type, label, notes, timestamp) {
            tooltip.innerHTML = `
                <div class="marker-type">${label || type}</div>
                ${notes ? `<div class="marker-notes">${notes}</div>` : ''}
                <div class="marker-time">${timestamp}</div>
            `;
        };

        // Click handler
        renderer.domElement.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Check if clicking transform control first
            const controlIntersects = raycaster.intersectObjects(transformControl.children, true);
            if (controlIntersects.length > 0) return;

            // Check for marker clicks
            const markerObjects = Object.values(markers);
            const markerIntersects = raycaster.intersectObjects(markerObjects, false);

            if (markerIntersects.length > 0) {
                const clickedMarker = markerIntersects[0].object;
                const markerId = clickedMarker.userData.id;

                // Highlight selection immediately
                setSelectedMarker(markerId);

                // DISABLED: No longer showing gizmo, just select the marker
                // transformControl.attach(clickedMarker);

                if (window.flutter_inappwebview) {
                    window.flutter_inappwebview.callHandler('onMarkerSelected', { id: markerId });
                }
                return;
            }

            // ONLY add marker if in 'add' mode
            if (interactionMode === 'add') {
                if (!bodyModel) return;

                const bodyIntersects = raycaster.intersectObjects(bodyModel.children, true);
                if (bodyIntersects.length > 0) {
                    transformControl.detach();

                    const intersection = bodyIntersects[0];
                    const point = intersection.point;
                    const normal = intersection.face.normal;

                    const offset = normal.clone().multiplyScalar(defaultMarkerRadius * 0.5);
                    const finalPosition = point.clone().add(offset);

                    if (window.flutter_inappwebview) {
                        window.flutter_inappwebview.callHandler('onBodyClick', {
                            x: finalPosition.x,
                            y: finalPosition.y,
                            z: finalPosition.z
                        });
                    }
                }
            } else {
                // In SELECT mode, clicking body (empty space) deselects
                if (window.flutter_inappwebview) {
                    window.flutter_inappwebview.callHandler('onMarkerDeselected', {});
                    setSelectedMarker(null);
                }
            }
        });

        // Add marker function
        window.addMarker = function (x, y, z, color, id, scale = 1.0) {
            // Check if marker already exists
            if (markers[id]) {
                const existingMarker = markers[id];
                existingMarker.position.set(x, y, z);
                existingMarker.material.color.set(color);
                existingMarker.scale.setScalar(scale);
                return;
            }

            const geometry = new THREE.SphereGeometry(defaultMarkerRadius, 16, 16);
            const material = new THREE.MeshStandardMaterial({ color: color });
            const marker = new THREE.Mesh(geometry, material);

            marker.position.set(x, y, z);
            marker.scale.setScalar(scale);
            marker.userData.id = id;

            markers[id] = marker;
            scene.add(marker);
        };

        // Update markers function
        window.updateMarkers = function (markersList) {
            const newIds = new Set(markersList.map(m => m.id));

            // Remove deleted markers
            Object.keys(markers).forEach(id => {
                if (!newIds.has(id)) {
                    scene.remove(markers[id]);
                    delete markers[id];
                }
            });

            // Add or update markers
            markersList.forEach(m => {
                if (markers[m.id]) {
                    const marker = markers[m.id];
                    marker.position.set(m.x, m.y, m.z);
                    marker.material.color.set(m.color);
                    marker.scale.setScalar(m.scale || 1.0);
                } else {
                    window.addMarker(m.x, m.y, m.z, m.color, m.id, m.scale || 1.0);
                }
            });
        };

        // Animation loop
        // Ensure setSelectedMarker is globally available
        window.setSelectedMarker = function (id) {
            selectedMarkerId = id;

            // Reset all emissive colors
            Object.values(markers).forEach(mesh => {
                if (mesh.material) {
                    mesh.material.emissive.setHex(0x000000);
                }
            });
        };

        window.setInteractionMode = function (mode) {
            interactionMode = mode;
            // Update cursor style?
            renderer.domElement.style.cursor = mode === 'add' ? 'crosshair' : 'default';
        };

        function animate() {
            requestAnimationFrame(animate);
            orbitControls.update();

            // Pulse animation for selected marker
            if (selectedMarkerId && markers[selectedMarkerId]) {
                const selectedMesh = markers[selectedMarkerId];
                if (selectedMesh.material) {
                    // Pulse from black to dark red/highlight based on time
                    const time = Date.now() * 0.005;
                    const pulse = (Math.sin(time) + 1) * 0.5; // 0 to 1
                    // Set emissive to a pulsing white/highlight
                    selectedMesh.material.emissive.setHSL(0, 0, pulse * 0.5);
                }
            }

            renderer.render(scene, camera);
        }
        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
